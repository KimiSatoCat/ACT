*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f0ede8;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:16px 0;}
#frame{width:390px;max-height:720px;background:#FAFAF7;border-radius:32px;overflow:hidden;display:flex;flex-direction:column;border:1px solid #ddd;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes drift{0%{transform:translateX(-40px) translateY(0)}50%{transform:translateX(40px) translateY(-8px)}100%{transform:translateX(-40px)}}
@keyframes breathe{0%,100%{transform:scale(0.55);opacity:.6}25%{transform:scale(1.45);opacity:1}50%{transform:scale(1.45);opacity:1}75%{transform:scale(0.55);opacity:.6}}
@keyframes bdot{0%{transform:translateY(0)}100%{transform:translateY(-7px)}}
@keyframes ripple-med{0%{transform:translate(-50%,-50%) scale(1);opacity:0.5}100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}}
@keyframes particle-float{0%,100%{transform:translateY(0);opacity:0.2}50%{transform:translateY(-18px);opacity:0.65}}
@keyframes med-pulse{0%,100%{box-shadow:0 0 25px rgba(90,140,42,0.25)}50%{box-shadow:0 0 55px rgba(90,140,42,0.5)}}
.fi{animation:fadein .35s ease forwards;}
.leaf{animation:drift 3s ease-in-out infinite;}
.bcircle{animation:breathe 16s ease-in-out infinite;}
textarea{font-family:'Noto Sans JP',sans-serif;outline:none;}
textarea:focus{border-color:#8FAB5A!important;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#D0DCC0;border-radius:2px;}
</style>

// ── Helpers
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function last7(){return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d;});}
function greet(){const h=new Date().getHours();if(h>=5&&h<12)return'おはようございます 🌿';if(h>=12&&h<18)return'こんにちは 🌱';return'こんばんは 🌙';}
function delay(phase,ms=1300){setTimeout(()=>setState({phase}),ms);}

// ── DOM helpers
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k==='on'&&typeof v==='object'){
      // on:{click:fn} 形式のイベントハンドラ
      Object.entries(v).forEach(([ev,fn])=>{if(typeof fn==='function')el.addEventListener(ev,fn);});
    }
    else if(k==='className')el.className=v;
    else if(k!=='on')el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    if(typeof c==='number')c=String(c);        // 数値を自動で文字列変換
    if(typeof c==='boolean')return;             // booleanは無視
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}
function btn(label,onclick,opts={}){
  const {outline,danger,sml,full,disabled}=opts;
  const bg=danger?'transparent':outline?'transparent':disabled?'#B5C9A0':C.p;
  const col=danger?'#B03A2E':outline?C.p:'#fff';
  const brd=danger?`1.5px solid #FFB3AE`:outline?`1.5px solid ${C.pM}`:'none';
  return h('div',{style:{borderRadius:'30px',paddingTop:sml?'9px':'12px',paddingBottom:sml?'9px':'12px',paddingLeft:sml?'18px':'28px',paddingRight:sml?'18px':'28px',textAlign:'center',cursor:disabled?'default':'pointer',userSelect:'none',backgroundColor:bg,border:brd,opacity:disabled?0.5:1,width:full?'100%':'auto'},on:{'click':disabled?null:onclick}},
    h('span',{style:{color:col,fontSize:sml?'12px':'13px',fontWeight:700}},label));
}
function aibubble(msg){

// ── Breathing guide
function breathGuide(){
  const s=ST.breathSec;
  const ph=s<4?0:s<8?1:s<12?2:3;
  const phs=['吸って','止めて','吐いて','止めて'];
  const phCol=['#5A8C2A','#8FAB5A','#2E7D8C','#5A8C7A'];
  const cnt=s<4?4-s:s<8?8-s:s<12?12-s:16-s;
  const wrap=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 0 14px'}},
    h('div',{style:{fontSize:'11px',color:C.tMu,marginBottom:'12px',textAlign:'center',lineHeight:1.6}},'ゆっくり4拍のリズムで呼吸してみましょう。（4-4-4-4 box breathing）'),
    h('div',{className:'bcircle',style:{width:'90px',height:'90px',borderRadius:'50%',backgroundColor:C.pL,border:`2px solid ${C.pM}`,marginBottom:'12px'}}),
    h('div',{style:{fontSize:'28px',fontWeight:700,color:C.pD,marginBottom:'3px'}},String(cnt)),
    h('div',{style:{fontSize:'14px',fontWeight:700,color:phCol[ph],marginBottom:'4px'}},phs[ph]),
    h('div',{style:{fontSize:'10px',color:C.tH,marginBottom:ST.breathReady?'14px':'0'}},'ゆっくりと、繰り返してみましょう')
  );
  if(ST.breathReady){
    const b=btn('気持ちの準備ができたら次へ',()=>setState({phase:'bodyscan'}),{sml:true});
    b.className='fi';
    wrap.appendChild(b);
  }
  return wrap;
}
function startBreath(){
  if(ST.breathTimer)clearInterval(ST.breathTimer);
  let s=0;
  const t=setInterval(()=>{
    s++;
    const ready=s>=16;
    setState({breathSec:s%16,breathReady:ready||ST.breathReady});
    if(s>=32)clearInterval(t); // stop after 2 cycles
  },1000);
  setState({breathTimer:t});
}

    // 同意の一言
    h('div',{style:{fontSize:'11px',color:C.tH,textAlign:'center',lineHeight:1.7,marginBottom:'20px'}},
      'タップすることで',
      h('span',{style:{textDecoration:'underline'}},'利用規約'),
      'に同意したことになります。',
      h('br'),
      '※ このデモでは実際のサインインは行いません'
    ),
    toggleEl,
    detailEl,
    // 特徴紹介
    h('div',{style:{marginTop:'24px'}},
      ...[ 
        {i:'🧠',t:'思考との距離を広げる','d':'ACTに基づいた3種のワークで、思考に振り回されにくくなります。'},
        {i:'🔒',t:'プライバシーを守る','d':'入力した文章は端末内だけで処理されます。外部には送信されません。'},
        {i:'📊',t:'変化を記録する','d':'14日間続けると、AIが傾向を分析した振り返りレポートを生成します。'},
      ].map(({i,t,d})=>h('div',{style:{display:'flex',gap:'12px',marginBottom:'16px',alignItems:'flex-start'}},
        h('div',{style:{fontSize:'22px',marginTop:'2px'}},i),
        h('div',null,
          h('div',{style:{fontSize:'13px',fontWeight:700,color:C.pD,marginBottom:'3px'}},t),
          h('div',{style:{fontSize:'11px',color:C.tMu,lineHeight:1.6}},d)
        )
      ))
    )
  );
}

function renderWork(){
  const wt=getTodayWork();const wc=WC[wt];const stepL=['入力',wc.s,'感情','確認'];
  const wrap=h('div',{style:{flex:1,display:'flex',flexDirection:'column',backgroundColor:C.bg}});
  const nav=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderBottom:`1px solid ${C.bL}`,flexShrink:0}},
    h('div',{style:{cursor:'pointer',color:C.p,fontSize:'13px',fontWeight:700,width:'50px'},on:{click:()=>{if(ST.step===0){setState({scr:'tabs',tab:'home'});}else setState({step:ST.step-1});}}}, '← 戻る'),
    h('div',{style:{fontSize:'14px',fontWeight:700,color:C.pD}},wc.i+' '+wc.l),
    h('div',{style:{width:'50px'}})
  );
  wrap.appendChild(nav);
  const body=h('div',{style:{flex:1,overflowY:'auto',padding:'14px 15px 44px'}});
  body.appendChild(steps(stepL,ST.step));

  if(ST.step===0){
    const sec=h('div',{className:'fi'});
    if(wt==='shelf')sec.appendChild(shelfExplain());
    sec.appendChild(h('div',{style:{fontSize:'16px',fontWeight:700,color:C.pD,marginBottom:'5px',lineHeight:1.4}},'今、どんな思考が浮かんでいますか？'));
    sec.appendChild(h('div',{style:{fontSize:'12px',color:C.tMu,marginBottom:'12px',lineHeight:'1.7',whiteSpace:'pre-line'}},'正解はないよ。うまく書けなくてもOK。\n「よくわからない」「なんか嫌な感じがする」\nそれだけでも、全然いい。'));
    sec.appendChild(catSelector());
    // textarea: setState()でre-renderせず、直接DOMだけ更新してフォーカスを保持
    const charCount=h('div',{style:{textAlign:'right',fontSize:'10px',color:C.tH,marginTop:'3px',marginBottom:'13px'}},String(ST.rawText.length)+' / 400');
    const isOk=()=>ST.rawText.trim().length>=3;
    const nextBtnInner=h('span',{style:{color:'#fff',fontSize:'13px',fontWeight:700}},'次へ');
    const nextBtnEl=h('div',{style:{borderRadius:'30px',paddingTop:'12px',paddingBottom:'12px',textAlign:'center',cursor:isOk()?'pointer':'default',userSelect:'none',backgroundColor:isOk()?C.p:'#B5C9A0',width:'100%'},on:{click:()=>{if(isOk())setState({step:1});}}},nextBtnInner);
    const ta=h('textarea',{style:{width:'100%',borderRadius:'12px',padding:'12px',fontSize:'13px',color:C.t,minHeight:'110px',border:'1.5px solid '+C.b,lineHeight:'1.6',backgroundColor:C.s,resize:'none'},placeholder:'なんでも書いていいよ。わからなければ「わからない」って書くだけでもOK。',maxlength:'400'});
    ta.value=ST.rawText;
    ta.addEventListener('input',e=>{
      ST.rawText=e.target.value;              // re-renderしない（フォーカス保持）
      charCount.textContent=ST.rawText.length+' / 400';
      ta.style.borderColor=ST.rawText.length>0?C.pM:C.b;
      nextBtnEl.style.backgroundColor=isOk()?C.p:'#B5C9A0';
      nextBtnEl.style.cursor=isOk()?'pointer':'default';
    });
    sec.appendChild(ta);
    sec.appendChild(charCount);
    sec.appendChild(nextBtnEl);
    // 初期フォーカス
    setTimeout(()=>{try{ta.focus();}catch(e){}},50);
    body.appendChild(sec);
  }
  else if(ST.step===1){
    const sec=h('div',{className:'fi'});
    if(wt==='shelf'){
      // ── ① 説明ヘッダー
      const ttl=document.createElement('div');
      ttl.style.cssText='font-size:16px;font-weight:700;color:'+C.pD+';margin-bottom:5px;line-height:1.4;';
      ttl.textContent='思考を「ただの言葉」にしてみましょう';
      sec.appendChild(ttl);
      const sub=document.createElement('div');
      sub.style.cssText='font-size:12px;color:'+C.tM+';line-height:1.6;margin-bottom:14px;';
      sub.textContent='同じ言葉を繰り返し読むことで、言葉と意味が少しずつ離れていきます。これがACTの「脱フュージョン」体験です。（Hayes et al., 1999）';
      sec.appendChild(sub);

      // ── ② 思考テキストを大きく表示
      const card=document.createElement('div');
      card.style.cssText='background:'+C.pL+';border-radius:14px;padding:20px 16px;margin-bottom:16px;text-align:center;border:1px solid '+C.pM+';';
      const cardHint=document.createElement('div');
      cardHint.style.cssText='font-size:11px;color:'+C.tMu+';margin-bottom:10px;';
      cardHint.textContent='心の中で、またはそっと声に出して、10回読んでください';
      card.appendChild(cardHint);
      const wordEl=document.createElement('div');
      wordEl.style.cssText='font-size:20px;font-weight:700;color:'+C.pD+';line-height:1.5;transition:color 0.5s ease,transform 0.5s ease;';
      wordEl.textContent='「'+ST.rawText.trim()+'」';
      card.appendChild(wordEl);
      sec.appendChild(card);

      // ── ③ 繰り返しカウンター（re-renderしない直接DOM操作）
      const R_TOTAL=10;let rLeft=R_TOTAL;
      const repeatSec=document.createElement('div');
      repeatSec.style.cssText='text-align:center;margin-bottom:16px;';
      const countLbl=document.createElement('div');
      countLbl.style.cssText='font-size:22px;font-weight:700;color:'+C.p+';margin-bottom:10px;';
      countLbl.textContent='残り '+rLeft+' 回';
      repeatSec.appendChild(countLbl);
      const progBg=document.createElement('div');
      progBg.style.cssText='height:5px;background:'+C.bL+';border-radius:3px;overflow:hidden;margin-bottom:14px;';
      const progFill=document.createElement('div');
      progFill.style.cssText='height:100%;width:0%;background:'+C.pM+';border-radius:3px;transition:width 0.4s ease;';
      progBg.appendChild(progFill);repeatSec.appendChild(progBg);
      const tapBtn=document.createElement('div');
      tapBtn.style.cssText='background:'+C.p+';border-radius:30px;padding:16px 0;text-align:center;cursor:pointer;margin-bottom:10px;user-select:none;font-size:15px;color:#fff;font-weight:700;';
      tapBtn.textContent='読んだ　👆';
      repeatSec.appendChild(tapBtn);
      const hintLbl=document.createElement('div');
      hintLbl.style.cssText='font-size:11px;color:'+C.tH+';line-height:1.6;';
      hintLbl.textContent='声に出すか、心の中で読んで、タップしてください';
      repeatSec.appendChild(hintLbl);
      sec.appendChild(repeatSec);

      // ── ④ インサイトセクション（完了後に表示）
      const insightSec=document.createElement('div');
      insightSec.style.display='none';
      const insCard=document.createElement('div');
      insCard.style.cssText='background:#F0F6E8;border-radius:14px;padding:18px;margin-bottom:16px;border-left:4px solid '+C.pM+';';
      const ins1=document.createElement('div');
      ins1.style.cssText='font-size:15px;font-weight:700;color:'+C.pD+';margin-bottom:10px;';
      ins1.textContent='気づきましたか？';
      insCard.appendChild(ins1);
      const ins2=document.createElement('div');
      ins2.style.cssText='font-size:13px;color:'+C.tM+';line-height:1.9;';
      ins2.innerHTML='繰り返すうちに、その言葉が少し変わった感じがしませんでしたか？<br><br>'
        +'意味が薄れたり、ただの音に聞こえてきたり。<br><br>'
        +'<strong style="color:'+C.pD+'">思考は「現実」ではなく、「言葉」にすぎません。</strong><br><br>'
        +'あなたはその思考に気づいて、ここに立っています。それで十分です。';
      insCard.appendChild(ins2);
      insightSec.appendChild(insCard);
      const nextBtn2=document.createElement('div');
      nextBtn2.style.cssText='background:'+C.p+';border-radius:30px;padding:13px 0;text-align:center;cursor:pointer;font-size:14px;color:#fff;font-weight:700;';
      nextBtn2.textContent='棚に置いた 🗄️';
      nextBtn2.addEventListener('click',()=>{
        showWorkAnim({
          theme:'shelf',
          words:[ST.rawText.trim().slice(0,20)+(ST.rawText.trim().length>20?'…':'')],
          title:'思考を棚に置きました',
          subtitle:'また必要になったら、<br>いつでも取り出せます',
          dur:9000,
        },()=>setState({step:2}));
      });
      insightSec.appendChild(nextBtn2);
      sec.appendChild(insightSec);

      // ── タップイベント
      tapBtn.addEventListener('click',()=>{
        rLeft--;
        const ratio=rLeft/R_TOTAL;
        // 読むほど文字が薄く・小さくなる（意味が薄れる視覚表現）
        wordEl.style.color='rgba(45,80,22,'+(0.18+ratio*0.82)+')';
        wordEl.style.transform='scale('+(1-(1-ratio)*0.1)+')';
        progFill.style.width=((R_TOTAL-rLeft)/R_TOTAL*100)+'%';
        if(rLeft<=0){
          countLbl.textContent='10回 完了 ✓';
          countLbl.style.color=C.p;
          setTimeout(()=>{
            repeatSec.style.opacity='0';
            repeatSec.style.transition='opacity 0.5s';
            setTimeout(()=>{
              repeatSec.style.display='none';
              insightSec.style.display='block';
              insightSec.className='fi';
            },500);
          },600);
        } else {
          countLbl.textContent='残り '+rLeft+' 回';
        }
      });
    } else if(wt==='label'){
      // ════ ラベルを貼るワーク（4ステップ） ════

      // アニメーションCSS（1回だけ注入）
      if(!document.getElementById('labelAnimCSS')){
        const lst=document.createElement('style');lst.id='labelAnimCSS';
        lst.textContent='@keyframes labelStick{0%{transform:scale(0) rotate(-12deg);opacity:0}60%{transform:scale(1.08) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}'
          +'@keyframes tagFly{0%{transform:translateY(30px) scale(0.6);opacity:0}70%{transform:translateY(-4px) scale(1.05)}100%{transform:translateY(0) scale(1);opacity:1}}'
          +'@keyframes stampPop{0%{transform:scale(2.5);opacity:0}70%{transform:scale(0.9);opacity:1}100%{transform:scale(1);opacity:1}}'
          +'@keyframes bigStampDrop{0%{transform:scale(5) rotate(-25deg);opacity:0}40%{transform:scale(0.82) rotate(4deg);opacity:1}62%{transform:scale(1.1) rotate(-2deg)}78%{transform:scale(0.95) rotate(1deg)}90%{transform:scale(1.04)}100%{transform:scale(1) rotate(0deg);opacity:1}}'
          +'@keyframes overlayFlash{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}'
          +'@keyframes cardBounce{0%{transform:scale(1)}20%{transform:scale(0.93) rotate(-1deg)}45%{transform:scale(1.06) rotate(1deg)}65%{transform:scale(0.97)}82%{transform:scale(1.03)}100%{transform:scale(1)}}'
          +'@keyframes wordFloat{0%{transform:translateY(0) scale(1);opacity:1}70%{opacity:0.6}100%{transform:translateY(-160px) scale(0.75);opacity:0}}'
          +'@keyframes wordFadeIn{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}'
          +'@keyframes affectOverlayFade{0%{opacity:0}12%{opacity:1}80%{opacity:1}100%{opacity:0}}'
          +'@keyframes wordDrift{0%{transform:translateX(0) scale(1);opacity:1}60%{opacity:0.6}100%{transform:translateX(220px) scale(0.75);opacity:0}}';
        document.head.appendChild(lst);
      }

      let lPreScore=50; let lCategory=null; let lCategoryLabel=''; let lAffects=new Set();
      const STEP_TOTAL=4;

      function mk(tag,css,txt){const el=document.createElement(tag);if(css)el.style.cssText=css;if(txt!==undefined)el.textContent=txt;return el;}
      function mkBtn(label,fn){const b=mk('div','background:'+C.p+';border-radius:28px;padding:12px 0;text-align:center;cursor:pointer;font-size:14px;color:#fff;font-weight:700;margin-bottom:8px;',label);b.onclick=fn;return b;}
      function stepHeader(n,title){
        const w=mk('div','margin-bottom:14px;','');
        const bar=mk('div','display:flex;gap:5px;margin-bottom:8px;','');
        for(let i=1;i<=STEP_TOTAL;i++){const d=mk('div','flex:1;height:4px;border-radius:2px;background:'+(i<=n?C.p:C.bL)+';','');bar.appendChild(d);}
        const step=mk('div','font-size:10px;color:'+C.tH+';margin-bottom:4px;','ステップ '+n+' / '+STEP_TOTAL);
        const hd=mk('div','font-size:15px;font-weight:700;color:'+C.pD+';','');hd.textContent=title;
        w.appendChild(bar);w.appendChild(step);w.appendChild(hd);return w;
      }
      function thoughtCard(){
        const tc=mk('div','background:'+C.pL+';border-radius:12px;padding:11px 13px;margin-bottom:12px;border-left:3px solid '+C.pM+';','');
        tc.innerHTML='<div style="font-size:10px;color:'+C.tMu+';margin-bottom:3px;">あなたの思考</div>'
          +'<div style="font-size:13px;font-weight:700;color:'+C.pD+';">「'+ST.rawText.trim()+'」</div>';
        return tc;
      }

      // ─── ステップ1: 思考の「重さ」チェック ─────────────
      function lShowPre(){
        sec.innerHTML='';
        sec.appendChild(stepHeader(1,'思考の「重さ」を確かめる'));

        // わかりやすい説明
        const expCard=mk('div','background:#FFF8E8;border-radius:12px;padding:12px 14px;margin-bottom:12px;border-left:3px solid #FFAA44;','');
        expCard.innerHTML='<div style="font-size:12px;color:#7A5A20;line-height:1.7;">'
          +'<strong>なにをするの？</strong><br>'
          +'「この思考は、どれくらいリアルに感じますか？」をスライダーで教えてください。<br>'
          +'0% ＝ 「まあ気にならない」<br>'
          +'100% ＝ 「これは絶対に本当だ！」<br>'
          +'<span style="font-size:10px;color:#9A7A40;">直感で動かしてOKです。正解はありません。</span>'
          +'</div>';
        sec.appendChild(expCard);
        sec.appendChild(thoughtCard());

        const scoreDisp=mk('div','font-size:32px;font-weight:700;color:'+C.p+';text-align:center;margin-bottom:6px;',lPreScore+'%');
        const emoji=mk('div','font-size:18px;text-align:center;margin-bottom:10px;','😐');
        const updateEmoji=(v)=>{emoji.textContent=v<25?'😌':v<50?'😐':v<75?'😟':'😰';};

        const slider=document.createElement('input');
        slider.type='range';slider.min='0';slider.max='100';slider.value=String(lPreScore);slider.step='1';
        slider.style.cssText='width:100%;margin-bottom:4px;';
        slider.oninput=()=>{lPreScore=Number(slider.value);scoreDisp.textContent=lPreScore+'%';updateEmoji(lPreScore);};
        updateEmoji(lPreScore);

        const labs=mk('div','display:flex;justify-content:space-between;font-size:10px;color:'+C.tH+';margin-bottom:16px;','');
        labs.innerHTML='<span>0% 気にならない</span><span>100% 絶対に本当！</span>';

        sec.appendChild(scoreDisp);sec.appendChild(emoji);sec.appendChild(slider);sec.appendChild(labs);
        sec.appendChild(mkBtn('この重さで次へ →',lShowCategory));
      }

      // ─── ステップ2: ラベルを選んで貼る（アニメーション付き） ─
      function lShowCategory(){
        sec.innerHTML='';
        sec.appendChild(stepHeader(2,'ラベルを選んで貼る'));

        const howTo=mk('div','background:#F0F6E8;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#4A6A2A;line-height:1.7;','');
        howTo.innerHTML='<strong>やり方：</strong>下の5つから、この思考に一番近いラベルをタップしてください。タップすると思考にラベルが貼られます。';
        sec.appendChild(howTo);

        // 思考カード（ラベル表示エリアつき）
        const tcWrap=mk('div','position:relative;margin-bottom:14px;','');
        const tc=mk('div','background:'+C.pL+';border-radius:12px;padding:12px 13px;border-left:3px solid '+C.pM+';transition:all .3s;','');
        tc.innerHTML='<div style="font-size:10px;color:'+C.tMu+';margin-bottom:3px;">あなたの思考</div>'
          +'<div style="font-size:13px;font-weight:700;color:'+C.pD+';">「'+ST.rawText.trim()+'」</div>';

        // ラベルタグ（初期は非表示）
        const labelTag=mk('div','display:none;margin-top:8px;padding-top:8px;border-top:1px dashed '+C.pM+';','');
        tc.appendChild(labelTag);
        tcWrap.appendChild(tc);

        // 思考カード下の「ラベル待ち」インジケーター
        const waitMsg=mk('div','text-align:center;font-size:11px;color:'+C.tH+';margin-top:4px;','↑ タップしたラベルがここに貼られます');
        tcWrap.appendChild(waitMsg);
        sec.appendChild(tcWrap);

        const cats=[
          {id:'eval',i:'⚖️',l:'評価の物語',d:'良い・悪い・正しい・間違いの判断'},
          {id:'pred',i:'🌀',l:'予測の物語',d:'「〜になるかも」という将来への想定'},
          {id:'rule',i:'📋',l:'ルールの物語',d:'「〜すべき」「〜ねばならない」'},
          {id:'mem', i:'🕰️',l:'記憶の物語',d:'過去の出来事・経験からくる思考'},
          {id:'self',i:'🔍',l:'自己批判の物語',d:'自分に向けた否定・責め・批判'},
        ];

        const gr=mk('div','display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;','');
        cats.forEach(c=>{
          const el=mk('div','background:'+C.s+';border:1.5px solid '+C.b+';border-radius:12px;padding:9px 8px;cursor:pointer;transition:all .25s;text-align:center;','');
          el.innerHTML='<div style="font-size:18px;margin-bottom:3px;">'+c.i+'</div>'
            +'<div style="font-size:12px;font-weight:700;color:'+C.pD+';margin-bottom:2px;">'+c.l+'</div>'
            +'<div style="font-size:10px;color:'+C.tMu+';line-height:1.4;">'+c.d+'</div>';
          el.onclick=()=>{
            lCategory=c.id; lCategoryLabel=c.l;
            // カテゴリカードを選択状態に
            [...gr.children].forEach(x=>{x.style.borderColor=C.b;x.style.background=C.s;x.style.transform='scale(1)';});
            el.style.borderColor=C.pM; el.style.background=C.pL; el.style.transform='scale(1.03)';
            // 思考カードにラベルをアニメーションで貼る
            labelTag.innerHTML='<div style="display:flex;align-items:center;gap:6px;animation:tagFly .4s ease-out both;">'
              +'<span style="font-size:14px;">🏷️</span>'
              +'<div><div style="font-size:10px;color:'+C.tH+';margin-bottom:1px;">貼られたラベル</div>'
              +'<div style="font-size:13px;font-weight:700;color:'+C.p+';animation:stampPop .4s .1s ease-out both;">'+c.i+' '+c.l+'</div></div>'
              +'<div style="margin-left:auto;font-size:18px;animation:stampPop .3s .2s ease-out both;">✓</div>'
              +'</div>';
            labelTag.style.display='block';
            waitMsg.style.display='none';
            tc.style.borderColor=C.p;
            // ネクストボタンを表示
            if(!document.getElementById('labelNextBtn')){
              const nb=mkBtn('このラベルを貼る ✓',()=>{
                // ── フルスクリーン スタンプアニメーション ──
                const overlay=document.createElement('div');
                overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;animation:overlayFlash 10s ease-out forwards;pointer-events:none;';

                // 背景フラッシュ（白い円が広がる）
                const flash=document.createElement('div');
                flash.style.cssText='position:absolute;width:600px;height:600px;border-radius:300px;background:rgba(255,255,255,0.12);transform:scale(0);transition:transform 4.0s ease-out;';
                overlay.appendChild(flash);
                setTimeout(()=>{flash.style.transform='scale(1)';},50);

                // スタンプカード本体
                const stamp=document.createElement('div');
                stamp.style.cssText='background:#fff;border-radius:22px;padding:36px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:bigStampDrop 4.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards;position:relative;min-width:220px;';

                // スタンプの「インク縁」（外周リング）
                const ring=document.createElement('div');
                ring.style.cssText='position:absolute;inset:-6px;border-radius:28px;border:4px solid '+C.pM+';opacity:0.5;';
                stamp.appendChild(ring);

                stamp.innerHTML+='<div style="font-size:60px;margin-bottom:10px;line-height:1;">'+c.i+'</div>'
                  +'<div style="font-size:20px;font-weight:700;color:'+C.pD+';margin-bottom:6px;">'+c.l+'</div>'
                  +'<div style="font-size:12px;color:#8A8A8A;letter-spacing:0.5px;">貼りました ✓</div>';

        '晴れやか':'晴れやかな気持ちで今日のワークを終えられますね。その軽さをこのまま持っていってください。次にまた重くなっても、今日の感覚が道標になります。',

        '恐れ':'恐れを感じているのですね。恐れは、自分を守ろうとする自然な感覚です。その感情に気づいていること、それ自体がとても大切な一歩です。無理に消そうとしなくて構いません。',
        '苛立ち':'苛立ちは、何かへの強い期待や、大切な価値観が脅かされているサインかもしれません。その感情の奥に、あなたが本当に求めているものがあるかもしれません。',
        '怒り':'怒りは、自分の境界線や大切なものを守ろうとするエネルギーです。その感情を責めず、ただ観察してみてください。怒りの奥にある「大切なもの」に気づけると、次の一歩が見えることがあります。',
        '悲しさ':'悲しさを感じているのですね。悲しさは、何かをとても大切にしていたという証です。今は、その感情と一緒にいることを許してあげてください。',
        '落ち込み':'落ち込んでいるのですね。それは今この瞬間の状態であり、あなたの全てではありません。今日、自分の内側を見つめようとしたこと、それだけで十分です。',
        '疲れ':'心と体が休息を求めているのかもしれません。今日のワークを終えた後は、どうか自分を労わることを優先してください。疲れを感じながらここまで取り組んだこと、それ自体が大切な実践です。',
        '空虚感':'空虚さを感じているのですね。それは、何かとつながりたいという願いの裏側かもしれません。今は、その空白をそのまま感じることを許してあげてください。',
      };

      // 感情バッジ
      const badge=h('div',{style:{display:'inline-flex',alignItems:'center',gap:'6px',backgroundColor:isPos?C.pL:'#FFF8F0',borderRadius:'20px',padding:'5px 12px',marginBottom:'12px',border:'1.5px solid '+(isPos?C.pM:'#FFCC99')}},
        h('span',{style:{fontSize:'16px'}},EI[ST.emotion]||''),
        h('span',{style:{fontSize:'12px',fontWeight:700,color:isPos?C.pD:'#B05A20'}},ST.emotion)
      );
      fb.appendChild(badge);

      // 臨床心理士のメッセージカード
      const msgCard=document.createElement('div');
      msgCard.style.cssText='background:'+(isPos?'#F0F6E8':'#FFF8F0')+';border-radius:14px;padding:16px;margin-bottom:14px;border-left:4px solid '+(isPos?C.pM:'#FFAA66')+';';
      const msgTtl=document.createElement('div');
      msgTtl.style.cssText='font-size:10px;color:'+(isPos?'#6A8A4A':'#9A6030')+';margin-bottom:6px;letter-spacing:0.5px;';

        doneBtn.style.cssText='background:'+C.p+';border-radius:28px;padding:13px 0;text-align:center;cursor:pointer;font-size:14px;color:#fff;font-weight:700;';

  else if(ST.step===3){

      }}},h('span',{style:{fontSize:'13px',color:C.tM}},opt.l));

  wrap.appendChild(body);

    );

      );

  // ── 呼吸オーブエリア
  const orbSec=document.createElement('div');
  orbSec.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;z-index:2;';

  // オーブラッパー（リップルのため）
  const orbWrap=document.createElement('div');
  orbWrap.style.cssText='position:relative;width:230px;height:230px;display:flex;align-items:center;justify-content:center;';

  // リップルリング × 3
  const ripples=[];
  for(let i=0;i<3;i++){
    const r=document.createElement('div');
    r.style.cssText='position:absolute;width:130px;height:130px;border-radius:50%;border:1.5px solid rgba(143,171,90,0.4);top:50%;left:50%;opacity:0;';
    orbWrap.appendChild(r);
    ripples.push(r);
  }

  // メインオーブ
  const orb=document.createElement('div');
  orb.style.cssText='width:130px;height:130px;border-radius:50%;background-color:rgba(90,140,42,0.18);border:2px solid rgba(143,171,90,0.55);display:flex;align-items:center;justify-content:center;transform:scale(0.62);transition:transform 4s ease-in-out;box-shadow:0 0 35px rgba(90,140,42,0.22);position:relative;z-index:3;animation:med-pulse 8s ease-in-out infinite;';

  // 内側の光球
  const inner=document.createElement('div');
  inner.style.cssText='width:55px;height:55px;border-radius:50%;background-color:rgba(143,171,90,0.35);transition:transform 4s ease-in-out,opacity 1s;';
  orb.appendChild(inner);
  orbWrap.appendChild(orb);

  // ── SVGプログレスアーク（オーブ外周をなめらかに回る進行線）
  const svgNS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('width','230');svg.setAttribute('height','230');
  svg.style.cssText='position:absolute;top:0;left:0;z-index:5;pointer-events:none;';
  // 背景リング（薄い）
  const bgRing=document.createElementNS(svgNS,'circle');
  bgRing.setAttribute('cx','115');bgRing.setAttribute('cy','115');bgRing.setAttribute('r','106');
  bgRing.setAttribute('fill','none');bgRing.setAttribute('stroke','rgba(143,171,90,0.1)');
  bgRing.setAttribute('stroke-width','2.5');
  svg.appendChild(bgRing);
  // 進行アーク
  const arcCircum=2*Math.PI*106; // ≈ 666
  const arc=document.createElementNS(svgNS,'circle');
  arc.setAttribute('cx','115');arc.setAttribute('cy','115');arc.setAttribute('r','106');
  arc.setAttribute('fill','none');arc.setAttribute('stroke','rgba(143,171,90,0.65)');
  arc.setAttribute('stroke-width','2.5');arc.setAttribute('stroke-linecap','round');
  arc.setAttribute('stroke-dasharray',String(arcCircum));
  arc.setAttribute('stroke-dashoffset',String(arcCircum));
  arc.setAttribute('transform','rotate(-90 115 115)');
  svg.appendChild(arc);
  orbWrap.appendChild(svg);

  // アーク開始ヘルパー（duration秒でなめらかに一周）
  function startArc(duration){
    arc.style.transition='none';
    arc.setAttribute('stroke-dashoffset',String(arcCircum));
    void arc.getBoundingClientRect(); // reflow強制
    arc.style.transition='stroke-dashoffset '+duration+'s linear';
    arc.setAttribute('stroke-dashoffset','0');
  }

  orbSec.appendChild(orbWrap);

  // フェーズラベル（吸って／止めて／吐いて）
  const phLabel=document.createElement('div');
  phLabel.style.cssText='font-size:26px;font-weight:700;color:rgba(255,255,255,0.9);margin-top:24px;margin-bottom:6px;letter-spacing:4px;text-align:center;transition:opacity 0.4s;';
  phLabel.textContent='準備して';
  orbSec.appendChild(phLabel);

  // カウントダウン数字
  const cntEl=document.createElement('div');
  cntEl.style.cssText='font-size:50px;font-weight:700;color:rgba(255,255,255,0.82);margin-bottom:10px;min-height:64px;display:flex;align-items:center;justify-content:center;transition:opacity 0.65s ease,transform 0.65s ease;';
  orbSec.appendChild(cntEl);

  // ガイダンステキスト
  const guideEl=document.createElement('div');
  guideEl.style.cssText='font-size:12px;color:rgba(255,255,255,0.38);text-align:center;line-height:1.8;max-width:240px;min-height:42px;transition:opacity 0.6s;';
  guideEl.textContent='背筋を軽く伸ばし、肩の力を抜いてください';
  orbSec.appendChild(guideEl);

  root.appendChild(orbSec);

  // ── ボトムエリア
  const bot=document.createElement('div');
  bot.style.cssText='display:flex;flex-direction:column;align-items:center;gap:14px;z-index:2;width:100%;';

  // サイクル進捗表示（プログレスバー + テキスト）
  const progressWrap=document.createElement('div');
  progressWrap.style.cssText='width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;';

  // 「第X回 / 15回」テキスト
  const cycleText=document.createElement('div');
  cycleText.style.cssText='font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:0.5px;';
  cycleText.textContent='第1回 / 15回';
  progressWrap.appendChild(cycleText);

  // プログレスバー
  const progBg=document.createElement('div');
  progBg.style.cssText='width:180px;height:3px;background:rgba(143,171,90,0.18);border-radius:2px;overflow:hidden;';
  const progFill=document.createElement('div');
  progFill.style.cssText='height:100%;width:0%;background:rgba(143,171,90,0.75);border-radius:2px;transition:width 0.8s ease;';
  progBg.appendChild(progFill);
  progressWrap.appendChild(progBg);

  bot.appendChild(progressWrap);
  const dots=[]; // 後方互換のため空配列

  // アクションボタン（スキップ → 完了後は「次へ」に変化）
  const actBtn=document.createElement('div');
  actBtn.style.cssText='border:1.5px solid rgba(143,171,90,0.35);border-radius:28px;padding:11px 28px;cursor:pointer;transition:border-color 0.5s,background-color 0.5s;';
  actBtn.innerHTML='<span style="font-size:12px;color:rgba(255,255,255,0.45);font-weight:700;transition:color 0.5s;">スキップ</span>';
  actBtn.onclick=()=>{cleanup();if(onComplete)onComplete();};
  bot.appendChild(actBtn);

  root.appendChild(bot);

  // ── アニメーションロジック ──────────────────────────

  // ── Web Audio API（ブラウザ内蔵、外部ファイル不要）
  // Solfeggio周波数ベースのチャイム音（Zaccaro et al., 2018 slow breathing研究に準拠）
  let muted=false;
  let _audioCtx=null;
  function getACtx(){
    if(!_audioCtx){
      try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
    }
    if(_audioCtx&&_audioCtx.state==='suspended')_audioCtx.resume();
    return _audioCtx;
  }
  function playBell(freq,dur,vol){
    if(muted)return;
    const ctx=getACtx();if(!ctx)return;
    // 倍音を重ねてチャイム感を出す
    [[1,vol],[2.756,vol*0.4],[5.404,vol*0.2]].forEach(([ratio,v])=>{
      try{
        const osc=ctx.createOscillator(),g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);
        osc.type='sine';osc.frequency.setValueAtTime(freq*ratio,ctx.currentTime);
        g.gain.setValueAtTime(v,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
        osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
      }catch(e){}
    });
  }
  function chimeInhale(){playBell(528,2.5,0.18);}   // 528Hz: 落ち着き
  function chimeExhale(){playBell(396,3.0,0.15);}   // 396Hz: 解放
  function chimeComplete(){
    setTimeout(()=>playBell(528,2.0,0.20),0);
    setTimeout(()=>playBell(639,2.5,0.15),300);     // 528+639: 完了チャイム
  }

  // ── 呼吸フェーズ定義（5-2-7-1 リラクゼーション最適比率）
  // 吐く時間を長くすることで副交感神経優位に（Jerath et al. 2015）
  const PHASES=[
    {name:'inhale',label:'吸って', dur:5,trans:5,guide:'鼻からゆっくりと、お腹が膨らむように'},
    {name:'exhale',label:'吐いて', dur:7,trans:7,guide:'口からゆっくりと、すべて吐き出します'},
  ];

  function triggerRipple(){
    ripples.forEach((r,i)=>{
      r.style.animation='none';
      void r.offsetWidth;
      r.style.animation='ripple-med 3.5s '+(i*0.55)+'s ease-out forwards';
    });
  }

  function applyPhase(ph){
    phLabel.textContent=ph.label;
    guideEl.textContent=ph.guide;
    // アークをフェーズの長さでなめらかに進行
    startArc(ph.dur*(TICK_MS/1000));
    if(ph.name==='inhale'){
      orb.style.transition='transform '+(ph.trans*TICK_MS/1000)+'s ease-in-out';
      orb.style.transform='scale(1.52)';
      inner.style.transform='scale(1.4)';
      orb.style.boxShadow='0 0 55px rgba(90,140,42,0.38),inset 0 0 20px rgba(143,171,90,0.15)';
      arc.setAttribute('stroke','rgba(143,171,90,0.7)');
      chimeInhale();
    } else if(ph.name==='hold1'){
      orb.style.transition='none';
      orb.style.boxShadow='0 0 65px rgba(90,140,42,0.45),inset 0 0 28px rgba(143,171,90,0.2)';
      arc.setAttribute('stroke','rgba(200,210,170,0.5)');
    } else if(ph.name==='exhale'){
      orb.style.transition='transform '+(ph.trans*TICK_MS/1000)+'s ease-in-out';
      orb.style.transform='scale(0.58)';
      inner.style.transform='scale(0.75)';
      orb.style.boxShadow='0 0 18px rgba(46,100,120,0.2)';
      arc.setAttribute('stroke','rgba(100,160,180,0.6)');
      chimeExhale();
      triggerRipple();
    } else {
      orb.style.transition='none';
      orb.style.boxShadow='0 0 12px rgba(46,100,120,0.12)';
      arc.setAttribute('stroke','rgba(143,171,90,0.3)');
    }
  }

  function cleanup(){if(mTimer){clearInterval(mTimer);mTimer=null;}}

  function markCycleDone(){
    const idx=cyclesDone-1;
    if(idx>=0&&idx<dots.length){
      dots[idx].style.backgroundColor='rgba(143,171,90,0.82)';
      dots[idx].style.width='18px';
    }
  }

  function showComplete(){
    cleanup();
    chimeComplete();
    phLabel.textContent='お疲れさまでした';
    guideEl.textContent='ゆっくりと目を開けてください。今の自分の状態に気づいてみましょう。';
    cntEl.textContent='';
    actBtn.style.borderColor='rgba(143,171,90,0.9)';
    actBtn.style.backgroundColor='rgba(90,140,42,0.2)';
    actBtn.innerHTML='<span style="font-size:13px;color:rgba(255,255,255,0.95);font-weight:700;">次へ進む →</span>';
    actBtn.onclick=()=>{cleanup();if(onComplete)onComplete();};
  }

  // ── TICK_MS を外スコープに定義（applyPhase から参照できるように）
  const TICK_MS = 1250; // 1カウント = 1.25秒（5count=6.25秒, 7count=8.75秒）

  // ── 数字表示（即時）
  function showCount(val) {
    cntEl.style.transition = 'none';
    cntEl.textContent = val > 0 ? String(val) : '';
    cntEl.style.opacity = '1';
    cntEl.style.transform = 'scale(1)';
  }

  // ── 数字フェード
  // フェードアウト: 0.15秒（素早く消える）
  // フェードイン:   0.8秒（ゆっくり浮かび上がる）
  // → 1秒インターバル内に0.8秒の余裕があり、ゆっくり見える
  function fadeCount(val) {
    cntEl.style.transition = 'opacity 0.15s ease';
    cntEl.style.opacity = '0';
    cntEl.style.transform = 'scale(1.08)';
    setTimeout(() => {
      cntEl.textContent = val > 0 ? String(val) : '';
      cntEl.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
      cntEl.style.opacity = '1';
      cntEl.style.transform = 'scale(1)';
    }, 150);
  }

  function cleanup() { if (mTimer) { clearInterval(mTimer); mTimer = null; } }

  function markCycleDone() {
    // プログレスバーと「第X回」テキストを更新
    const pct = (cyclesDone / TOTAL) * 100;
    progFill.style.width = pct + '%';
    const next = cyclesDone + 1;
    if (next <= TOTAL) {
      cycleText.textContent = '第' + next + '回 / ' + TOTAL + '回';
    } else {
      cycleText.textContent = '完了';
    }
  }

  function showComplete() {
    cleanup();
    chimeComplete();
    phLabel.textContent = 'お疲れさまでした';
    guideEl.textContent = 'ゆっくりと目を開けてください。今の自分の状態に気づいてみましょう。';
    cntEl.textContent = '';
    actBtn.style.borderColor = 'rgba(143,171,90,0.9)';
    actBtn.style.backgroundColor = 'rgba(90,140,42,0.2)';
    actBtn.innerHTML = '<span style="font-size:13px;color:rgba(255,255,255,0.95);font-weight:700;">次へ進む →</span>';
    actBtn.onclick = () => { cleanup(); if (onComplete) onComplete(); };
  }

  // ── イントロ（3.5秒後に呼吸開始）
  setTimeout(() => {
    guideEl.textContent = '目を閉じるか、視線を柔らかく落としてください';
  }, 1800);

  setTimeout(() => {
    let phIdx = 0;
    let cd = PHASES[0].dur;

    // 最初のフェーズを開始
    applyPhase(PHASES[0]);
    showCount(cd); // 最初の数字は即時表示

    mTimer = setInterval(() => {
      cd--;

      if (cd <= 0) {
        // フェーズ切り替え
        phIdx = (phIdx + 1) % PHASES.length;

        if (phIdx === 0) {
          // 1サイクル完了
          cyclesDone++;
          markCycleDone();
          if (cyclesDone >= TOTAL) { showComplete(); return; }
        }

        const ph = PHASES[phIdx];
        applyPhase(ph);
        cd = ph.dur;
        showCount(cd); // フェーズ切り替え時は即時表示
      } else {
        fadeCount(cd); // カウント中はゆっくりフェード
      }
    }, TICK_MS);
  }, 3500);

  return root;
}

function emotionBarChart(sessions7){
  const cnts={};
  sessions7.forEach(s=>{if(s.emotion)cnts[s.emotion]=(cnts[s.emotion]||0)+1;});
  const sorted=Object.entries(cnts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const el=document.createElement('div');
  if(!sorted.length){
    el.style.cssText='font-size:12px;color:'+C.tH+';text-align:center;padding:8px 0;';
    el.textContent='ワークを続けるとグラフが表示されます';
    return el;
  }
  const mx=sorted[0][1]||1;
  sorted.forEach(([em,cnt])=>{
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
    const lbl=document.createElement('div');lbl.style.cssText='width:62px;font-size:11px;color:'+C.tMu+';text-align:right;flex-shrink:0;';lbl.textContent=em;
    const bw=document.createElement('div');bw.style.cssText='flex:1;height:9px;background:'+C.bL+';border-radius:5px;overflow:hidden;';
    const bf=document.createElement('div');bf.style.cssText='height:100%;width:'+(cnt/mx*100)+'%;background:'+C.pM+';border-radius:5px;';
    bw.appendChild(bf);
    const num=document.createElement('div');num.style.cssText='font-size:11px;color:'+C.p+';font-weight:700;width:18px;';num.textContent=String(cnt);
    row.appendChild(lbl);row.appendChild(bw);row.appendChild(num);el.appendChild(row);
  });
  return el;
}

function workDistChart(sessions){
  const wc={shelf:0,label:0,river:0};
  sessions.filter(s=>s.completedAt).forEach(s=>{if(wc[s.workType]!==undefined)wc[s.workType]++;});
  const tot=wc.shelf+wc.label+wc.river||1;
  const el=document.createElement('div');
  [['shelf','棚に置く','🗄️'],['label','ラベルを貼る','🏷️'],['river','川に流す','🍃']].forEach(([k,l,i])=>{
    const pct=Math.round(wc[k]/tot*100);
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
    const ico=document.createElement('span');ico.style.cssText='font-size:14px;width:22px;';ico.textContent=i;
    const lbl=document.createElement('span');lbl.style.cssText='font-size:11px;color:'+C.tMu+';width:74px;';lbl.textContent=l;
    const bw=document.createElement('div');bw.style.cssText='flex:1;height:9px;background:'+C.bL+';border-radius:5px;overflow:hidden;';
    const bf=document.createElement('div');bf.style.cssText='height:100%;width:'+pct+'%;background:'+C.pM+';border-radius:5px;';
    bw.appendChild(bf);
    const pctEl=document.createElement('span');pctEl.style.cssText='font-size:10px;color:'+C.p+';font-weight:700;width:28px;text-align:right;';pctEl.textContent=pct+'%';
    row.appendChild(ico);row.appendChild(lbl);row.appendChild(bw);row.appendChild(pctEl);el.appendChild(row);
  });
  return el;
}


// 日付ベースのワークローテーション（3日周期、連日同じワーク防止）
function getTodayWork(){
  const d=new Date();
  const dayKey=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  return WO[dayKey%3];
}

// 今日すでにワークを完了しているか確認
function isTodayDone(){
  const today=new Date();
  return ST.sessions.some(s=>{
    if(!s.completedAt) return false;
    const c=new Date(s.completedAt);
    return c.getFullYear()===today.getFullYear()
      && c.getMonth()===today.getMonth()
      && c.getDate()===today.getDate();
  });
}


// ════════════════════════════════════════════════════
// ワーク完了アニメーション（共有）
// ════════════════════════════════════════════════════
function showWorkAnim(config, onComplete){
  const {theme, words, title, subtitle} = config;
  const dur = config.dur || 9000;

  // テーマ別カラー
  const themes = {
    shelf: {bg:'rgba(35,28,15,0.75)', ptColor:'rgba(255,220,120,0.3)', txtColor:'rgba(255,240,200,0.92)', accentColor:'rgba(220,190,80,0.5)'},
    river: {bg:'rgba(8,38,55,0.75)', ptColor:'rgba(100,210,220,0.3)', txtColor:'rgba(190,240,255,0.92)', accentColor:'rgba(80,180,210,0.5)'},
    label: {bg:'rgba(10,30,60,0.75)', ptColor:'rgba(180,220,255,0.35)', txtColor:'rgba(220,240,255,0.95)', accentColor:'rgba(120,180,255,0.4)'},
  };
  const t = themes[theme] || themes.label;

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:'+t.bg+';z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:affectOverlayFade '+(dur/1000)+'s ease-out forwards;pointer-events:none;overflow:hidden;';

  // 背景パーティクル
  for(let p=0;p<14;p++){
    const pt=document.createElement('div');
    const sz=3+Math.random()*7;
    const animName = theme==='river' ? 'wordDrift' : 'wordFloat';
    pt.style.cssText='position:absolute;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+t.ptColor+';left:'+(Math.random()*100)+'%;top:'+(20+Math.random()*60)+'%;animation:'+animName+' '+(6+Math.random()*5)+'s '+(Math.random()*2)+'s ease-out both;';
    overlay.appendChild(pt);
  }

  // タイトルメッセージ
  if(title){
    const msgBox=document.createElement('div');
    msgBox.style.cssText='text-align:center;margin-bottom:28px;animation:wordFadeIn 1.2s 0.4s ease both;opacity:0;';
    msgBox.innerHTML='<div style="font-size:13px;color:'+t.accentColor.replace('0.5','0.8')+';margin-bottom:6px;letter-spacing:1px;">'+title+'</div>'
      +(subtitle?'<div style="font-size:15px;color:'+t.txtColor+';line-height:1.7;">'+subtitle+'</div>':'');
    overlay.appendChild(msgBox);
  }

  // ワードを1つずつ浮かばせる
  const wds = (words && words.length) ? words : ['気づいた'];
  const wordWrap=document.createElement('div');
  wordWrap.style.cssText='display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:280px;';
  const animName = theme==='river' ? 'wordDrift' : 'wordFloat';
  wds.forEach((w,i)=>{
    const wEl=document.createElement('div');
    wEl.style.cssText='background:rgba(255,255,255,0.1);border:1px solid '+t.accentColor+';border-radius:24px;padding:9px 18px;font-size:15px;font-weight:700;color:'+t.txtColor+';animation:wordFadeIn 0.9s '+(0.7+i*0.6)+'s ease both,'+animName+' 5s '+(2.8+i*0.7)+'s ease-in forwards;opacity:0;';
    wEl.textContent=w;
    wordWrap.appendChild(wEl);
  });
  overlay.appendChild(wordWrap);

  // 締めの言葉
  const endTxt=document.createElement('div');
  const endMessages={shelf:'そっと棚に置きました',river:'川に流れていきました',label:'言葉にしてくれてありがとう'};
  endTxt.style.cssText='margin-top:36px;font-size:11px;color:'+t.accentColor.replace('0.5','0.6')+';letter-spacing:0.5px;animation:wordFadeIn 1s '+(1.8+wds.length*0.6)+'s ease both;opacity:0;';
  endTxt.textContent=endMessages[theme]||'';
  overlay.appendChild(endTxt);

  document.body.appendChild(overlay);
  setTimeout(()=>{overlay.remove();onComplete();}, dur);
}

function render(){
  const app=document.getElementById('app');
  const tb=document.getElementById('tabbar');
  try {
    app.innerHTML='';tb.innerHTML='';
    if(ST.scr==='auth'){app.appendChild(renderAuth());return;}
    if(ST.scr==='work'){app.appendChild(renderWork());return;}
    if(ST.scr==='ball'){app.appendChild(renderBall());return;}
    if(ST.scr==='meditation'){
      // ホームからの瞑想（standalone）
      app.appendChild(renderMeditation(()=>{
        const ret=ST.meditationReturn||'tabs';
        setState({scr:ret,tab:'home'});
      }));
      return;
    }
    if(ST.tab==='home')app.appendChild(renderHome());
    else if(ST.tab==='reports')app.appendChild(renderReports());
    else app.appendChild(renderSettings());
    tb.appendChild(renderTabBar());
  } catch(err) {
    app.innerHTML='';
    const errDiv=document.createElement('div');
    errDiv.style.cssText='padding:20px;background:#fff0f0;border:1px solid #fcc;border-radius:8px;margin:16px;font-size:12px;color:#900;word-break:break-all;white-space:pre-wrap;';
    errDiv.textContent='ERROR in render():\n'+err.message+'\n\nStack:\n'+err.stack+'\n\nST.scr='+ST.scr+' ST.phase='+ST.phase;
    app.appendChild(errDiv);
    console.error('render() error:', err);
  }
}
render();
</script>
